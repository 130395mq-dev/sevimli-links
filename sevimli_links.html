<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sevimli Market</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f0ef;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    padding: 3rem 1.2rem 5rem;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeDown 0.5s ease forwards;
  }

  .logo-wrap {
    width: 130px;
    height: 130px;
    background: white;
    border-radius: 32px;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(139,0,0,0.12);
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.1s forwards;
    opacity: 0;
  }

  .logo-wrap img {
    width: 110px;
    height: 110px;
    object-fit: contain;
  }

  .brand-name {
    font-size: 28px;
    font-weight: 900;
    color: #1a0a0a;
    letter-spacing: 6px;
    font-family: Georgia, serif;
    margin-bottom: 6px;
  }

  .brand-sub {
    font-size: 12px;
    color: #999;
    letter-spacing: 2px;
    margin-bottom: 14px;
  }

  .active-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: white;
    border-radius: 20px;
    padding: 6px 16px;
    box-shadow: 0 2px 8px rgba(139,0,0,0.08);
  }

  .active-dot {
    width: 8px; height: 8px;
    background: #8B0000;
    border-radius: 50%;
    animation: pulseDot 1.5s ease infinite;
  }

  .active-text {
    font-size: 13px;
    color: #8B0000;
    font-weight: 600;
  }

  /* CARDS */
  .cards {
    display: flex;
    flex-direction: column;
    gap: 14px;
    flex: 1;
  }

  .card {
    background: white;
    border-radius: 20px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    text-decoration: none;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    opacity: 0;
    position: relative;
    overflow: hidden;
  }

  .card::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(139,0,0,0.04), transparent);
    transition: left 0.4s ease;
  }

  .card:hover::after { left: 150%; }
  .card:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(139,0,0,0.13); }
  .card:active { transform: scale(0.98); }

  .card-icon {
    width: 52px; height: 52px;
    background: #f9f0f0;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .card-divider {
    width: 1.5px; height: 44px;
    background: #f0e8e8;
    margin: 0 16px;
    flex-shrink: 0;
  }

  .card-info { flex: 1; }
  .card-title { font-size: 16px; font-weight: 700; color: #1a0a0a; margin-bottom: 3px; }
  .card-sub { font-size: 13px; color: #999; }

  .card-arrow {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1.5px solid #e8d5d5;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .card:hover .card-arrow { background: #8B0000; border-color: #8B0000; }
  .card:hover .card-arrow svg path { stroke: white; }

  /* FOOTER */
  .footer {
    text-align: center;
    margin-top: 2rem;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.7s forwards;
  }

  .footer-line {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .footer-line-hr { flex: 1; height: 1px; background: #ddd; }

  .footer-text {
    font-size: 10px;
    color: #bbb;
    letter-spacing: 2.5px;
    margin-bottom: 14px;
  }

  .insta-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1.5px solid #ddd;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto;
    text-decoration: none;
    transition: all 0.2s;
  }

  .insta-btn:hover { border-color: #8B0000; transform: scale(1.1); }

  /* BOTTOM RED */
  .bottom-red {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 56px;
    background: #8B0000;
    border-radius: 36px 36px 0 0;
  }

  /* ANIMATIONS */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.7); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes pulseDot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.5; }
  }
  .card:nth-child(1) { animation: fadeUp 0.5s ease 0.2s forwards; }
  .card:nth-child(2) { animation: fadeUp 0.5s ease 0.35s forwards; }
  .card:nth-child(3) { animation: fadeUp 0.5s ease 0.5s forwards; }
</style>
</head>
